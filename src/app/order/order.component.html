<div class="order-container">
    <h1>Kasse</h1>
    <span>Braun's Burger Bude</span>

    <div class="user-data-container">
        <div class="personal-data-container">
            <div class="personal-user-data">
                <mat-form-field class="mr-16" appearance="outline">
                    <mat-label>First Name</mat-label>
                    <input [disabled]="loading" [(ngModel)]="user.firstName" matInput placeholder="First name">
                  </mat-form-field>
        
                  <mat-form-field  appearance="outline">
                    <mat-label>Last Name</mat-label>
                    <input [disabled]="loading" [(ngModel)]="user.lastName" matInput placeholder="Last name">
                  </mat-form-field>
            </div>
        
            <div class="personal-user-data">
                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>email</mat-label>
                    <input [disabled]="loading" [(ngModel)]="user.email" matInput placeholder="email">
                </mat-form-field>
    
                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Birth Date</mat-label>
                    <input [disabled]="loading" [(ngModel)]="birthDate" matInput placeholder="Placeholder" [matDatepicker]="picker1">
                    <mat-datepicker-toggle matIconSuffix [for]="picker1"></mat-datepicker-toggle>
                    <mat-datepicker #picker1></mat-datepicker>
                  </mat-form-field>
            </div>
        </div>
    
        <div class="adress-user-data">
              <mat-form-field appearance="outline" class="full-width">
                <mat-label>Street + House No</mat-label>
                <input [disabled]="loading" [(ngModel)]="user.street" matInput placeholder="Placeholder">
              </mat-form-field>

              <mat-form-field class="mr-16" appearance="outline">
                <mat-label>Zip Code</mat-label>
                <input [disabled]="loading" [(ngModel)]="user.zipCode" matInput placeholder="Placeholder">
              </mat-form-field>
    
              <mat-form-field  appearance="outline">
                <mat-label>City</mat-label>
                <input [disabled]="loading" [(ngModel)]="user.city" matInput placeholder="Placeholder">
              </mat-form-field>
        </div>
    </div>
    <button (click)="getOrder()">get User</button>
</div>
