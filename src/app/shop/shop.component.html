<img class="atf-image" src="../../assets/burgerBackground.jpeg">
<div class="shop-header">
    <h1>Braun's Burger Bude</h1>
    <div class="shop-rating">
        <mat-icon>star</mat-icon>
        <mat-icon>star</mat-icon>
        <mat-icon>star</mat-icon>
        <mat-icon>star</mat-icon>
        <mat-icon>star_half</mat-icon>
        178 Bewertungen
    </div>
    <div class="buy-info">
        <!-- <span>
            <mat-icon>shopping_bag</mat-icon>
        </span>-->
        <span>
            <mat-icon>pedal_bike</mat-icon>
            1,99€
        </span>
    </div>
</div>

<div class="product-container">
    <h1>Hausgemachte Burger</h1>

    <div class="product" *ngFor="let meal of allMeals; let i = index">
        <div class="product-header">
            {{meal.mealName}}
            <button (click)="addToBasket(meal)" mat-mini-fab color="primary">
                <mat-icon>add</mat-icon>
            </button>
        </div>
        <span>{{meal.description}}</span>
        {{meal.price.toFixed(2).replace(".",",")}}€
    </div>
</div>

<div *ngIf="shoppingBasketService.sumOfProducts != 0 " class="responsive-btn-container">
    <div *ngIf="shoppingBasketService.userAtShop && shoppingBasketService.endSum" routerLink="order"
        (click)="shoppingBasketService.orderMeals()" class="responsive-pay-btn">
        Bezahlen ({{shoppingBasketService.endSum.toFixed(2)}}€)
    </div>
</div>
